name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package-source:
    name: Package source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Build source archive and checksums
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="HomeFrigateOllamaIaC-${tag}/" \
            -o "dist/HomeFrigateOllamaIaC-${tag}.tar.gz" \
            HEAD
          (cd dist && sha256sum ./* > checksums.txt)
      - name: Attest source archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
