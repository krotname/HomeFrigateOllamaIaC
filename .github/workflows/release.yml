name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package-source:
    name: Package source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Build source archive and checksums
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="home-frigate-ollama-iac-${tag}/" \
            -o "dist/home-frigate-ollama-iac-${tag}.tar.gz" \
            HEAD
          (cd dist && sha256sum ./* > checksums.txt)
      - name: Attest source archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
