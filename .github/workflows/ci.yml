name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  iac-validation:
    name: IaC validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANSIBLE_CONFIG: ansible.cfg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install IaC tools
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock
      - name: Lint YAML
        run: python -m yamllint .github ansible .yamllint.yml
      - name: Lint Ansible
        run: ansible-lint ansible/playbooks/site.yml
      - name: Check Ansible syntax
        run: >-
          ansible-playbook
          -i ansible/inventory.example.yml
          ansible/playbooks/site.yml
          --syntax-check
          -e @ansible/group_vars/all.example.yml

  powershell-validation:
    name: PowerShell validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path scripts, tests -Filter *.ps1 -Recurse | ForEach-Object {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $_.FullName,
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null
              if ($parseErrors) {
                  $errors += $parseErrors | ForEach-Object {
                      "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)"
                  }
              }
          }
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
          }
      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $findings = @()
          $findings += Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error
          $findings += Invoke-ScriptAnalyzer -Path tests -Recurse -Severity Error
          if ($findings) {
              $findings | Format-Table -AutoSize
              exit 1
          }

  powershell-tests:
    name: PowerShell tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force
      - name: Run PowerShell tests
        shell: pwsh
        run: Invoke-Pester -Path tests -CI

  secret-hygiene:
    name: Secret hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for obvious committed secrets
        run: |
          credential_terms='api[_-]?key|token|secret|password|private[_-]?key'
          shapes='ghp_|gho_|sk-|-----BEGIN|[A-Za-z0-9/+_=.-]{32,}'
          pattern="(${credential_terms}).*(=|:).*(${shapes})"
          if git grep -n --ignore-case -E "$pattern" -- . ':!SECURITY.md'; then
            echo "Potential committed secret detected"
            exit 1
          fi
