services:
  asr:
    container_name: asr
    build: .
    init: true
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      ASR_MODEL: ${ASR_MODEL:-Systran/faster-whisper-large-v3}
      ASR_DEVICE: ${ASR_DEVICE:-cuda}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      ASR_CPU_THREADS: ${ASR_CPU_THREADS:-4}
      ASR_PORT: ${ASR_PORT:-9443}
      ASR_TMP_DIR: /tmp/asr
      ASR_MAX_UPLOAD_BYTES: ${ASR_MAX_UPLOAD_BYTES:-104857600}
      ASR_MAX_CONCURRENT_TRANSCRIPTIONS: ${ASR_MAX_CONCURRENT_TRANSCRIPTIONS:-1}
    volumes:
      - ./models:/models
      - ./tmp:/tmp/asr
    ports:
      - "127.0.0.1:${ASR_BACKEND_PORT:-19443}:${ASR_PORT:-9443}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ['ASR_PORT'] + '/health', timeout=5)"
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
