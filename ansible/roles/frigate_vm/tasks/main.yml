---
- name: Validate required variables are not placeholders
  ansible.builtin.assert:
    that:
      - frigate_rtsp_user | length > 0
      - frigate_rtsp_password | length > 0
      - frigate_rtsp_user != "rtsp_viewer"
      - frigate_rtsp_password != "demo_camera_password"
      - cameras | length > 0
    fail_msg: "Set real camera credentials and cameras in ansible/group_vars/all.yml or Ansible Vault."

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - nginx-light
      - openssl
      - python3-yaml
    state: present
    update_cache: true

- name: Assert NVIDIA GPU is visible in VM
  ansible.builtin.command: nvidia-smi --query-gpu=name --format=csv,noheader
  register: frigate_vm_nvidia_smi
  changed_when: false

- name: Assert Docker is installed
  ansible.builtin.command: docker --version
  changed_when: false

- name: Create Frigate directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ frigate_root }}"
    - "{{ frigate_root }}/config"
    - "{{ frigate_root }}/config/model_cache"
    - "{{ frigate_root }}/certs"
    - "{{ frigate_media_path }}"

- name: Generate local self-signed certificate if missing
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -nodes
      - -newkey
      - rsa:2048
      - -days
      - "825"
      - -keyout
      - "{{ frigate_root }}/certs/privkey.pem"
      - -out
      - "{{ frigate_root }}/certs/fullchain.pem"
      - -subj
      - "/CN={{ frigate_vm_ip }}"
      - -addext
      - "subjectAltName=IP:{{ frigate_vm_ip }}{% for name in frigate_dns_names %},DNS:{{ name }}{% endfor %}"
  args:
    creates: "{{ frigate_root }}/certs/fullchain.pem"

- name: Render Frigate environment
  ansible.builtin.template:
    src: frigate.env.j2
    dest: "{{ frigate_root }}/.env"
    owner: root
    group: root
    mode: "0600"

- name: Render Frigate config
  ansible.builtin.template:
    src: frigate-config.yml.j2
    dest: "{{ frigate_root }}/config/config.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Frigate

- name: Install YOLO COCO-80 labelmap
  ansible.builtin.copy:
    src: coco-yolo-80.txt
    dest: "{{ frigate_root }}/config/model_cache/coco-yolo-80.txt"
    owner: root
    group: root
    mode: "0644"

- name: Install model build script
  ansible.builtin.copy:
    src: build-yolov9-onnx.sh
    dest: "{{ frigate_root }}/build-yolov9-onnx.sh"
    owner: root
    group: root
    mode: "0755"

- name: Build YOLOv9-t ONNX model if missing
  ansible.builtin.command: "{{ frigate_root }}/build-yolov9-onnx.sh"
  args:
    creates: "{{ frigate_root }}/config/model_cache/yolov9-t-320.onnx"

- name: Render Docker Compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ frigate_root }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Frigate

- name: Install or update Ollama
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v ollama >/dev/null 2>&1; then
      install_script="$(mktemp)"
      trap 'rm -f "$install_script"' EXIT
      curl --proto '=https' --tlsv1.2 -fsSL --retry 3 --connect-timeout 15 --max-time 120 \
        https://ollama.com/install.sh -o "$install_script"
      sh "$install_script"
    else
      echo "ollama already installed"
    fi
  args:
    executable: /bin/bash
  register: frigate_vm_ollama_install
  changed_when: "'ollama already installed' not in frigate_vm_ollama_install.stdout"

- name: Create Ollama systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Ollama service environment
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment=OLLAMA_HOST={{ ollama_host }}
      Environment=OLLAMA_KEEP_ALIVE={{ ollama_keep_alive }}
  notify:
    - Reload systemd
    - Restart Ollama

- name: Enable and start Ollama
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started
    daemon_reload: true

- name: Pull Ollama model
  ansible.builtin.command: "ollama pull {{ ollama_model }}"
  register: frigate_vm_ollama_pull
  changed_when: >
    'success' in (frigate_vm_ollama_pull.stdout | lower)
    or 'pulling' in (frigate_vm_ollama_pull.stdout | lower)

- name: Render Ollama HTTPS nginx site
  ansible.builtin.template:
    src: ollama-https.nginx.j2
    dest: /etc/nginx/sites-available/ollama-https
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable Ollama HTTPS nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/ollama-https
    dest: /etc/nginx/sites-enabled/ollama-https
    state: link
  notify: Restart nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Resolve ASR settings
  ansible.builtin.set_fact:
    frigate_vm_asr_enabled_resolved: "{{ asr_enabled | default(frigate_vm_asr_enabled) }}"
    frigate_vm_asr_root_resolved: "{{ asr_root | default(frigate_vm_asr_root) }}"
    frigate_vm_asr_port_resolved: "{{ asr_port | default(frigate_vm_asr_port) }}"
    frigate_vm_asr_model_resolved: "{{ asr_model | default(frigate_vm_asr_model) }}"
    frigate_vm_asr_device_resolved: "{{ asr_device | default(frigate_vm_asr_device) }}"
    frigate_vm_asr_compute_type_resolved: "{{ asr_compute_type | default(frigate_vm_asr_compute_type) }}"
    frigate_vm_asr_cpu_threads_resolved: "{{ asr_cpu_threads | default(frigate_vm_asr_cpu_threads) }}"

- name: Create ASR directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ frigate_vm_asr_root_resolved }}"
    - "{{ frigate_vm_asr_root_resolved }}/models"
    - "{{ frigate_vm_asr_root_resolved }}/tmp"
  when: frigate_vm_asr_enabled_resolved | bool

- name: Install ASR service files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../asr/{{ item }}"
    dest: "{{ frigate_vm_asr_root_resolved }}/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - .dockerignore
    - Dockerfile
    - app.py
    - docker-compose.yml
    - requirements.txt
  when: frigate_vm_asr_enabled_resolved | bool

- name: Render ASR environment
  ansible.builtin.copy:
    dest: "{{ frigate_vm_asr_root_resolved }}/.env"
    owner: root
    group: root
    mode: "0644"
    content: |
      ASR_MODEL={{ frigate_vm_asr_model_resolved }}
      ASR_DEVICE={{ frigate_vm_asr_device_resolved }}
      ASR_COMPUTE_TYPE={{ frigate_vm_asr_compute_type_resolved }}
      ASR_CPU_THREADS={{ frigate_vm_asr_cpu_threads_resolved }}
      ASR_PORT={{ frigate_vm_asr_port_resolved }}
  when: frigate_vm_asr_enabled_resolved | bool

- name: Start Frigate
  ansible.builtin.command: docker compose -f "{{ frigate_root }}/docker-compose.yml" up -d
  changed_when: true

- name: Start ASR
  ansible.builtin.command: docker compose -f "{{ frigate_vm_asr_root_resolved }}/docker-compose.yml" up -d --build
  changed_when: true
  when: frigate_vm_asr_enabled_resolved | bool

- name: Enable nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Verify Frigate API
  ansible.builtin.uri:
    url: "https://127.0.0.1:8971/api/version"
    validate_certs: false
    return_content: true
  register: frigate_vm_frigate_version

- name: Verify Ollama API
  ansible.builtin.uri:
    url: "http://127.0.0.1:11434/api/version"
    return_content: true
  register: frigate_vm_ollama_version

- name: Verify ASR API
  ansible.builtin.uri:
    url: "https://127.0.0.1:{{ frigate_vm_asr_port_resolved }}/health"
    validate_certs: false
    return_content: true
  register: frigate_vm_asr_health
  when: frigate_vm_asr_enabled_resolved | bool

- name: Print deployment summary
  ansible.builtin.debug:
    msg:
      - "GPU: {{ frigate_vm_nvidia_smi.stdout }}"
      - "Frigate: {{ frigate_vm_frigate_version.content }}"
      - "Ollama: {{ frigate_vm_ollama_version.json.version | default(frigate_vm_ollama_version.content) }}"
      - "ASR: {{ frigate_vm_asr_health.json.model | default('disabled') }}"
