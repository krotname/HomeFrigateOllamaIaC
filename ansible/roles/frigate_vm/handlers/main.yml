---
- name: Restart Frigate
  ansible.builtin.command: docker compose -f "{{ frigate_root }}/docker-compose.yml" up -d
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Ollama
  ansible.builtin.systemd:
    name: ollama
    state: restarted

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
