---
# --force-recreate: bind-mounted files such as config.yml are not part of the
# container definition, so a plain "up -d" would keep the old configuration running.
- name: Restart Frigate
  ansible.builtin.command: >-
    docker compose -f "{{ frigate_root }}/docker-compose.yml" up -d --force-recreate
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Ollama
  ansible.builtin.systemd:
    name: ollama
    state: restarted

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
