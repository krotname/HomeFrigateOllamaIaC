---
frigate_root: /opt/frigate
frigate_media_path: /media/frigate
frigate_timezone: Europe/Moscow
frigate_vm_ip: 192.168.1.138
frigate_dns_names:
  - frigate-ubuntu
  - frigate.local

frigate_image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
frigate_model_path: /config/model_cache/yolov9-t-320.onnx
frigate_labelmap_path: /config/model_cache/coco-yolo-80.txt

ollama_host: 0.0.0.0:11434
ollama_https_port: 11443
ollama_model: qwen2.5vl:3b
ollama_keep_alive: 10m

# Put real values in ansible/group_vars/all.yml or Ansible Vault.
frigate_rtsp_user: CHANGE_ME
frigate_rtsp_password: CHANGE_ME

cameras:
  - name: cam1_ds_i202
    host: 192.168.1.12
    detect_width: 640
    detect_height: 360
    detect_fps: 5
    apple_compatibility: true
  - name: cam2_ds_i551
    host: 192.168.1.65
    detect_width: 640
    detect_height: 480
    detect_fps: 5
    apple_compatibility: false
