---
# Каталоги внутри Ubuntu VM.
frigate_root: /opt/frigate
frigate_media_path: /media/frigate
frigate_timezone: Europe/Moscow

# Адрес VM и локальные DNS-имена, которые попадут в self-signed сертификат.
frigate_vm_ip: 192.168.50.20
frigate_dns_names:
  - adler-frigate.local
  - adler-frigate
  - frigate-ubuntu

# Образ Frigate с поддержкой NVIDIA/TensorRT.
# Перед обновлением сверяйте release notes Frigate и прогоняйте smoke-test.
frigate_image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
frigate_model_path: /config/model_cache/yolov9-t-320.onnx
frigate_labelmap_path: /config/model_cache/coco-yolo-80.txt

# Ollama слушает HTTP внутри VM, а наружу отдается через nginx HTTPS proxy.
ollama_host: 0.0.0.0:11434
ollama_https_port: 11443
ollama_model: huihui_ai/gpt-oss-abliterated:20b
ollama_keep_alive: 10m

# Separate HTTPS ASR API on the same VM.
asr_enabled: true
asr_root: /opt/asr
asr_port: 9443
asr_model: Systran/faster-whisper-large-v3
asr_device: cuda
asr_compute_type: int8
asr_cpu_threads: 4

# Демонстрационные RTSP-учетные данные. Для реального стенда замените их
# в ansible/group_vars/all.yml и при необходимости зашифруйте файл Ansible Vault.
frigate_rtsp_user: rtsp_viewer
frigate_rtsp_password: demo_camera_password

# Пример двух камер Hikvision/совместимых RTSP-потоков:
# main stream на /101 пишется в архив, sub stream на /102 идет в detector.
cameras:
  - name: driveway_hikvision
    host: 192.168.50.31
    detect_width: 640
    detect_height: 360
    detect_fps: 5
    apple_compatibility: true
  - name: garage_hikvision
    host: 192.168.50.32
    detect_width: 640
    detect_height: 480
    detect_fps: 5
    apple_compatibility: false
